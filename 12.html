<!DOCTYPE html>
<html lang="es">
<head>
  <title>Mi Blog</title>
</head>
<body>

  <!-- PROBLEMA: Todo son <div> y <span> sin semántica ni landmarks.
                 Sin navegación, sin enlaces reales, sin estructura de página.
                 Los "Leer más" son ambiguos: el lector de pantalla no sabe
                 a qué artículo pertenece cada enlace. WCAG 1.3.1, 2.4.6 -->

  <!-- <nav> crea el landmark de navegación -->
  <nav aria-label="Navegación principal">
    <ul>
      <li><a href="#">Inicio</a></li>
      <li><a href="#">Sobre mí</a></li>
      <li><a href="#">Contacto</a></li>
    </ul>
  </nav>

  <!-- <main> identifica el contenido principal -->
  <main>

    <!-- <article> para cada entrada del blog, que es contenido autocontenido -->
    <article>
      <h2>Artículo Reciente</h2>
      <p>Este es el contenido del artículo. Lorem ipsum dolor sit amet,
         consectetur adipiscing elit.</p>
      <!-- aria-label hace el enlace descriptivo fuera de contexto.
           Sin él, el lector de pantalla solo diría "Leer más, enlace"
           sin saber a qué artículo pertenece. WCAG 2.4.6 -->
      <a href="#" aria-label="Leer más sobre Artículo Reciente">Leer más</a>
    </article>

    <article>
      <h2>Otro Artículo</h2>
      <p>Contenido del segundo artículo. Lorem ipsum dolor sit amet.</p>
      <a href="#" aria-label="Leer más sobre Otro Artículo">Leer más</a>
    </article>

  </main>

</body>
</html>
