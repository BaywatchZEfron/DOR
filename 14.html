<!DOCTYPE html>
<html lang="es">
<head>
  <title>Reporte de Ventas</title>
</head>
<body>
  <h1>Reporte Mensual de Ventas</h1>

  <!-- PROBLEMA: Solo <td> en toda la tabla, sin encabezados, sin estructura,
                 sin caption. El atributo border="" es obsoleto, se hace con CSS.
       SOLUCIÓN: <caption>, <thead>/<tbody>, <th scope> para asociar
                 cada celda con su encabezado de fila Y columna. WCAG 1.3.1 -->
  <table style="border-collapse: collapse;">
    <caption>Ventas mensuales por producto (unidades)</caption>

    <thead>
      <tr>
        <!-- scope="col" vincula el encabezado con su columna -->
        <th scope="col">Producto</th>
        <th scope="col">Enero</th>
        <th scope="col">Febrero</th>
        <th scope="col">Marzo</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <!-- scope="row" vincula el nombre del producto con su fila.
             El lector de pantalla leerá: "Zapatos, Enero: 100, Febrero: 150..." -->
        <th scope="row">Zapatos</th>
        <td>100</td>
        <td>150</td>
        <td>200</td>
      </tr>
      <tr>
        <th scope="row">Camisas</th>
        <td>200</td>
        <td>250</td>
        <td>300</td>
      </tr>
    </tbody>

  </table>

</body>
</html>
