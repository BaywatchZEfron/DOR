<!DOCTYPE html>
<html lang="es">
<head>
  <title>Formulario de Inscripción</title>
</head>
<body>
  <h1>Formulario de Inscripción</h1>

  <!-- PROBLEMA: Sin <label>, sin id, sin required, sin autocomplete.
                 El lector de pantalla no sabe qué pide cada campo. WCAG 1.3.1, 1.3.5 -->
  <form novalidate>
    <fieldset>
      <legend>Datos de inscripción</legend>

      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" name="nombre"
             placeholder="Ej: Ana García"
             required
             autocomplete="name"
             aria-describedby="error-nombre">
      <!-- aria-live anuncia el error dinámicamente. No hay equivalente HTML nativo. -->
      <span id="error-nombre" aria-live="polite" aria-atomic="true" style="color:red;"></span>

      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email"
             placeholder="Ej: ana@correo.com"
             required
             autocomplete="email"
             aria-describedby="error-email">
      <span id="error-email" aria-live="polite" aria-atomic="true" style="color:red;"></span>

      <!-- PROBLEMA: <select> sin <label> es inaccesible.
           SOLUCIÓN: <label for> vinculado + primera opción no seleccionable
           para evitar que "Seleccionar país" se envíe como valor válido. -->
      <label for="pais">País</label>
      <select
