<!DOCTYPE html>
<html lang="es">
<head>
  <title>Navegación</title>
</head>
<body>

  <!-- PROBLEMA: <div>+<span> no tienen semántica. Sin landmark, sin enlaces,
                 sin lista — el lector de pantalla no identifica nada.
       SOLUCIÓN: <nav> crea el landmark. <ul>+<li> estructuran la lista.
                 <a> hace los ítems enfocables y navegables. WCAG 1.3.1, 2.4.1
       aria-label distingue este <nav> si hubiera varios en la página. -->
  <nav aria-label="Navegación principal">
    <ul>
      <li><a href="#">Inicio</a></li>
      <li><a href="#">Servicios</a></li>
      <!-- En el enlace activo se añadiría aria-current="page" -->
      <li><a href="#">Contacto</a></li>
    </ul>
  </nav>

</body>
</html>
