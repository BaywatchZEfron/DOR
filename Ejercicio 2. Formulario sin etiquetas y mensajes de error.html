<!DOCTYPE html>
<html lang="es">
<head>
  <title>Registro</title>
</head>
<body>
  <h1>Formulario de Registro</h1>

  <form novalidate>
    <!-- <fieldset> agrupa campos relacionados; <legend> describe el grupo -->
    <fieldset>
      <legend>Datos de registro</legend>

      <!-- PROBLEMA: Sin <label>, el lector de pantalla no sabe qué pide el campo.
           SOLUCIÓN: <label for="id"> vinculado al input mediante id. WCAG 1.3.1 -->
      <label for="nombre">Nombre</label>
      <!-- aria-describedby vincula el input con su mensaje de error -->
      <input type="text" id="nombre" name="nombre"
             placeholder="Ej: Ana García"
             required
             aria-describedby="error-nombre">
      <!-- aria-live="polite": anuncia el error al lector de pantalla sin interrumpir.
           No existe equivalente HTML nativo para esto, por eso se usa ARIA. -->
      <span id="error-nombre" aria-live="polite" aria-atomic="true" style="color:red;"></span>

      <label for="email">Correo electrónico</label>
      <!-- autocomplete="email" ayuda a usuarios con dificultades motoras. WCAG 1.3.5 -->
      <input type="email" id="email" name="email"
             placeholder="Ej: ana@correo.com"
             required
             autocomplete="email"
             aria-describedby="error-email">
      <span id="error-email" aria-live="polite" aria-atomic="true" style="color:red;"></span>

    </fieldset>

    <!-- type="button" evita envíos accidentales si el botón está dentro de un form -->
    <button type="submit">Enviar formulario</button>
  </form>

</body>
</html>
