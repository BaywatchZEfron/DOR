<!DOCTYPE html>
<html lang="es">
<head>
  <title>Texto</title>
  <style>
    body {
      background-color: #f0f0f0;
      /* PROBLEMA: #a0a0a0 sobre #f0f0f0 da ratio ~2.9:1, insuficiente.
         WCAG 1.4.3 exige mínimo 4.5:1 para texto normal, 3:1 para texto grande.
         SOLUCIÓN: #595959 sobre #f0f0f0 da ratio ~7:1, supera el mínimo. */
      color: #595959;
    }
  </style>
</head>
<body>
  <h1>Texto difícil de leer</h1>
  <p>Este texto tiene un contraste suficiente con el fondo.</p>
</body>
</html>
