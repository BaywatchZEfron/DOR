<!DOCTYPE html>
<html lang="es">
<head>
  <title>Galería de Fotos</title>
</head>
<body>
  <h1>Galería de Fotos</h1>

  <!-- PROBLEMA: Sin alt, el lector de pantalla lee el nombre del archivo.
       SOLUCIÓN: alt descriptivo. WCAG 1.1.1 -->
  <img src="playa.jpg" alt="Vista panorámica de una playa con arena blanca y mar azul">

  <!-- Si la imagen fuera decorativa, se usaría alt="" para ignorarla -->
  <img src="montana.jpg" alt="Montaña nevada bajo un cielo despejado al amanecer">

</body>
</html>
