<!DOCTYPE html>
<html lang="es">
<head>
  <title>Video Educativo</title>
</head>
<body>
  <h1>Cómo cocinar pasta</h1>

  <!-- PROBLEMA: El video no tiene subtítulos ni descripción alternativa.
                 Usuarios sordos o con baja visión no pueden acceder al contenido.
       SOLUCIÓN:
       - <track kind="subtitles"> añade subtítulos sincronizados. WCAG 1.2.2
       - <track kind="descriptions"> añade audiodescripción. WCAG 1.2.5
       - aria-label describe el video al lector de pantalla. -->
  <video controls aria-label="Video tutorial: cómo cocinar pasta">
    <source src="video.mp4" type="video/mp4">

    <!-- subtitles: texto sincronizado para usuarios sordos o con dificultad auditiva -->
    <track
      kind="subtitles"
      src="subtitulos-es.vtt"
      srclang="es"
      label="Español"
      default
    >

    <!-- descriptions: narración adicional del contenido visual para usuarios con baja visión -->
    <track
      kind="descriptions"
      src="descripciones-es.vtt"
      srclang="es"
      label="Audiodescripción"
    >

    <!-- Fallback para navegadores que no soportan <video> -->
    <p>Tu navegador no soporta video HTML5.
      <a href="video.mp4">Descarga el video aquí</a>.
    </p>
  </video>

</body>
</html>
